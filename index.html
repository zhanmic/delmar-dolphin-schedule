<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Delmar Dolfins weekly practice schedule with Sr, Jr, DEVO, and Jr Prep filters."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Figtree:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Delmar Dolfins Schedule</title>
    <script>
      (function () {
        try {
          var k = 'delmar-schedule:theme'
          var t = localStorage.getItem(k)
          var h = new Date().getHours()
          var d = t === 'dark' || (t !== 'light' && (h >= 19 || h < 7))
          document.documentElement.classList.toggle('dark', d)
          document.documentElement.style.colorScheme = d ? 'dark' : 'light'
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
